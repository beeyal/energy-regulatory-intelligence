      name: NZ ETS (Emissions Trading Scheme)
      operator: MfE
      threshold_kt: 0
      price_unit: NZD/NZU
      price: 64
    key_legislation:
      - Electricity Industry Act 2010
      - Electricity Industry Participation Code 2010
      - Climate Change Response Act 2002
      - Energy Efficiency and Conservation Act 2000
    sub_regions:
