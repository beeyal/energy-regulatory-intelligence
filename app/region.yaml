## APJ Energy Regulatory Markets
## Used by server/region.py to configure the assistant and data layer per market

markets:
  AU:
    name: Australia
    flag: "🇦🇺"
    currency: AUD
    market_name: NEM (National Electricity Market)
    data_available: true
    regulators:
      - code: CER
        name: Clean Energy Regulator
        domain: Emissions, NGER reporting, Safeguard Mechanism
      - code: AEMO
        name: Australian Energy Market Operator
        domain: Market operations, dispatch, market notices
      - code: AER
        name: Australian Energy Regulator
        domain: Enforcement, compliance, network regulation
      - code: AEMC
        name: Australian Energy Market Commission
        domain: Rule-making, market design
      - code: ESV
        name: Energy Safe Victoria
        domain: Gas and electricity safety
    carbon_scheme:
      name: Safeguard Mechanism
      operator: CER
      threshold_kt: 100
      price_unit: AUD/tCO2-e
      price: 82
      shortfall_multiplier: 2.75
      baseline_decline_pct: 4.9
    key_legislation:
      - National Electricity Rules (NER)
      - National Energy Retail Law (NERL)
      - National Energy Retail Rules (NERR)
      - National Greenhouse and Energy Reporting Act 2007 (NGER Act)
      - Energy Safety Act (ESA)
      - Climate Change Act 2022
    sub_regions:
      - NSW1
      - VIC1
      - QLD1
      - SA1
      - TAS1
    known_companies:
      - AGL Energy
      - Origin Energy
      - EnergyAustralia
      - Stanwell Corporation
      - CS Energy
      - Alinta Energy
      - Snowy Hydro
      - ENGIE Australia
      - Synergy
      - Ergon Energy
    intent_extras:
      safeguard: [r"safeguard", r"nger", r"accu", r"baseline.*declin"]
      notices: [r"nem\b", r"nsw1?", r"vic1?", r"qld1?", r"sa1\b", r"tas1\b"]
    system_prompt_context: |
      You are an expert Australian energy compliance analyst covering the National Electricity Market (NEM).
      Key regulators: CER (emissions/Safeguard), AEMO (market operations), AER (enforcement), AEMC (rules), ESV (safety).
      Carbon scheme: Safeguard Mechanism — facilities >100kt CO2-e must stay within declining baselines (4.9%/year).
      Shortfall charge: 275% of prevailing ACCU price (~AUD 82/t). Cite NER chapters, NERL sections, NGER Act provisions.

