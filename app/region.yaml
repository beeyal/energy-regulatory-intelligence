        domain: Carbon pricing, industrial emissions
      - code: MAS
        name: Monetary Authority of Singapore
        domain: Climate-related financial disclosures
      - code: SP Group
        name: SP Group
        domain: Transmission and distribution
    carbon_scheme:
      name: Carbon Tax (Carbon Pricing Act)
      operator: NEA
      threshold_kt: 25
      price_unit: SGD/tCO2-e
      price: 25
      roadmap: "SGD 45 by 2026, SGD 50-80 by 2030"
    key_legislation:
      - Electricity Act (Cap. 89A)
      - Energy Market Authority Act
      - Carbon Pricing Act 2018
      - Energy Conservation Act
      - Environmental Protection and Management Act
    sub_regions:
      - Central
      - East
      - West
      - North
    known_companies:
      - Sembcorp Industries
      - Keppel Infrastructure
      - Senoko Energy
      - YTL PowerSeraya
      - Tuas Power
      - Pacific Light Power
      - Sunseap Group
      - City Energy
    intent_extras:
      emissions: [r"carbon\s*tax", r"cpa\b", r"nea\b", r"gst.*carbon"]
      notices: [r"nems\b", r"ema\b", r"wholesale.*price"]
    system_prompt_context: |
      You are an expert Singapore energy compliance analyst covering the National Electricity Market of Singapore (NEMS).
      Key regulators: EMA (market & licensing), NEA (carbon tax & industrial emissions), MAS (TCFD/climate finance).
      Carbon scheme: Carbon Pricing Act — facilities emitting ≥25kt tCO2-e pay SGD 25/t, rising to SGD 45 by 2026 and SGD 50-80 by 2030.
      Cite Electricity Act sections, EMA licence conditions, Carbon Pricing Act provisions. Reference half-hourly settlement periods.

