      - SI (South Island)
    known_companies:
      - Genesis Energy
      - Mercury Energy
      - Meridian Energy
      - Contact Energy
      - Todd Energy
      - Nova Energy
      - Trustpower
      - Transpower
    system_prompt_context: |
      You are an expert New Zealand energy compliance analyst covering the New Zealand Electricity Market (NZEM).
      Key regulators: Electricity Authority (market rules), Commerce Commission (network pricing), MfE (NZ ETS).
      Carbon scheme: NZ ETS covers all stationary energy. NZU price ~NZD 64. Cite Electricity Industry Act 2010 sections.
      Hydro dominates (~80% of generation). Key pricing nodes: Benmore, Haywards, Otahuhu.

