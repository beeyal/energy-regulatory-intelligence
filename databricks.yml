# ─────────────────────────────────────────────────────────────────────────────
# Energy Compliance Intelligence Hub — Databricks Asset Bundle
# ─────────────────────────────────────────────────────────────────────────────
# One-command deployment:  databricks bundle deploy -t dev
# ─────────────────────────────────────────────────────────────────────────────

bundle:
  name: energy-compliance-hub

include:
  - resources/*.yml
  - pipelines/pipeline_config.yml

variables:
  catalog:
    description: Unity Catalog catalog name for compliance data
    default: main
  schema:
    description: Schema name within the catalog
    default: compliance
  warehouse_size:
    description: SQL warehouse T-shirt size (2X-Small, X-Small, Small, Medium, Large)
    default: X-Small
  serving_endpoint:
    description: Model serving endpoint for LLM-powered compliance analysis
    default: databricks-meta-llama-3-3-70b-instruct
  # Pipeline variables (forwarded to pipelines/pipeline_config.yml)
  compliance_catalog:
    description: Unity Catalog target for DLT pipeline tables (defaults to catalog)
    default: main
  compliance_schema:
    description: Schema for DLT pipeline tables (defaults to schema)
    default: compliance
  pipeline_dev_mode:
    description: Run DLT pipeline in development mode
    default: "false"
  pipeline_alert_email:
    description: Email for DLT pipeline failure alerts
    default: "sourabh.ghose@databricks.com"

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

resources:
  jobs:
    setup_compliance_tables:
      name: "[${bundle.target}] Energy Compliance — Setup Tables"
      description: >
        Ingests emissions, enforcement, market notice, and regulatory obligation
        data into Unity Catalog Delta tables for the compliance hub.
      tasks:
        - task_key: setup_tables
          python_wheel_task:
            entry_point: setup_tables
          existing_cluster_id: ""  # overridden per-target or uses serverless
          spark_python_task:
            python_file: scripts/setup_tables.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
          libraries:
            - pypi:
                package: databricks-connect
            - pypi:
                package: requests
            - pypi:
                package: pandas
            - pypi:
                package: openpyxl
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: Australia/Sydney
      tags:
        project: energy-compliance-hub
        team: apj-buildathon

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: dev_compliance
      compliance_catalog: dev_compliance
      compliance_schema: compliance
      warehouse_size: 2X-Small
      pipeline_dev_mode: "true"
    resources:
      jobs:
        setup_compliance_tables:
          # Dev: run on-demand only, no schedule
          schedule: null
      pipelines:
        compliance_data_refresh:
          # Dev: disable scheduled trigger; run manually
          trigger: null
          development: true

  staging:
    variables:
      catalog: staging_compliance
      compliance_catalog: staging_compliance
      compliance_schema: compliance
      warehouse_size: X-Small
    resources:
      jobs:
        setup_compliance_tables:
          schedule:
            quartz_cron_expression: "0 0 6 * * ?"
            timezone_id: Australia/Sydney
      pipelines:
        compliance_data_refresh:
          trigger:
            cron:
              quartz_cron_expression: "0 0 3 * * ?"
              timezone_id: "UTC"

  prod:
    mode: production
    variables:
      catalog: ausnet_groupops_catalog
      compliance_catalog: ausnet_groupops_catalog
      compliance_schema: compliance
      warehouse_size: Small
      serving_endpoint: databricks-meta-llama-3-3-70b-instruct
      pipeline_alert_email: "sourabh.ghose@databricks.com"
    run_as:
      service_principal_name: energy-compliance-hub-sp
